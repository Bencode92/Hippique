<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistiques Globales — Analyse Hippique</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-teal: #0A2E2A;
            --medium-teal: #134542;
            --light-teal: #1B5A56;
            --gold: #D4AF37;
            --light-gold: #F1E6C8;
            --accent: #40E0D0;
            --red: #e05a40;
            --green: #40e05a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-teal);
            color: var(--light-gold);
            min-height: 100vh;
            line-height: 1.6;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 2rem;
            background: linear-gradient(to right, var(--dark-teal), var(--medium-teal));
            border-bottom: 1px solid rgba(233,209,140,0.2);
        }
        .logo h1 { font-size: 1.8rem; color: var(--gold); font-weight: 500; letter-spacing: 2px; }
        .main-nav { background-color: var(--medium-teal); padding: 0; }
        .main-nav ul { display: flex; list-style: none; }
        .main-nav li a {
            display: block; padding: 0.75rem 1.5rem; color: var(--light-gold);
            text-decoration: none; font-size: 0.9rem; transition: all 0.3s;
        }
        .main-nav li a:hover { background-color: var(--light-teal); }
        .main-nav li.active a { border-bottom: 2px solid var(--gold); color: var(--gold); }

        main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        .filters {
            display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end;
            background: rgba(255,255,255,0.03); border-radius: 12px;
            padding: 1.2rem; margin-bottom: 1.5rem;
            border: 1px solid rgba(233,209,140,0.15);
        }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }
        .filter-group input, .filter-group select {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(233,209,140,0.25);
            color: var(--light-gold); padding: 8px 12px; border-radius: 6px;
            font-family: inherit; font-size: 0.9rem;
        }
        .filter-group select { min-width: 160px; }
        .filter-group input[type="date"] { min-width: 150px; }

        /* Multi-select hippodromes */
        .hippo-multi { position: relative; }
        .hippo-btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(233,209,140,0.25);
            color: var(--light-gold); padding: 8px 12px; border-radius: 6px;
            font-family: inherit; font-size: 0.9rem; cursor: pointer; min-width: 200px;
            text-align: left; display: flex; justify-content: space-between; align-items: center;
        }
        .hippo-btn .count { background: var(--gold); color: var(--dark-teal); border-radius: 10px; padding: 1px 7px; font-size: 0.75rem; font-weight: 700; margin-left: 8px; }
        .hippo-dropdown {
            display: none; position: absolute; top: 100%; left: 0; z-index: 100;
            background: var(--medium-teal); border: 1px solid rgba(233,209,140,0.3);
            border-radius: 8px; max-height: 300px; overflow-y: auto; width: 280px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4); margin-top: 4px;
        }
        .hippo-dropdown.open { display: block; }
        .hippo-search {
            width: 100%; padding: 8px 12px; background: rgba(0,0,0,0.2); border: none;
            border-bottom: 1px solid rgba(233,209,140,0.15); color: var(--light-gold);
            font-family: inherit; font-size: 0.85rem;
        }
        .hippo-dropdown label {
            display: flex; align-items: center; padding: 6px 12px; cursor: pointer;
            font-size: 0.85rem; gap: 8px; transition: background 0.15s;
        }
        .hippo-dropdown label:hover { background: rgba(255,255,255,0.05); }
        .hippo-dropdown input[type="checkbox"] { accent-color: var(--gold); }
        .hippo-actions { display: flex; gap: 8px; padding: 6px 12px; border-top: 1px solid rgba(233,209,140,0.15); }
        .hippo-actions button {
            background: none; border: none; color: var(--accent); cursor: pointer;
            font-family: inherit; font-size: 0.8rem; padding: 2px 6px;
        }
        .hippo-actions button:hover { text-decoration: underline; }

        .btn-filter {
            background: var(--gold); color: var(--dark-teal); border: none;
            padding: 8px 20px; border-radius: 6px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 0.9rem; transition: opacity 0.2s;
        }
        .btn-filter:hover { opacity: 0.85; }
        .btn-filter:disabled { opacity: 0.5; cursor: wait; }
        .btn-preset {
            background: rgba(255,255,255,0.08); color: var(--light-gold); border: 1px solid rgba(233,209,140,0.2);
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-preset:hover, .btn-preset.active { background: var(--light-teal); border-color: var(--gold); color: var(--gold); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem; margin-bottom: 1.5rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.04); border-radius: 10px;
            padding: 1rem; text-align: center;
            border: 1px solid rgba(233,209,140,0.12);
        }
        .stat-card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 4px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--gold); }
        .stat-card .sub { font-size: 0.75rem; opacity: 0.7; margin-top: 2px; }

        .section {
            background: rgba(255,255,255,0.03); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            border: 1px solid rgba(233,209,140,0.12);
        }
        .section h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--gold); }
        .comp-table { width: 100%; border-collapse: collapse; }
        .comp-table th {
            text-align: left; padding: 8px 12px; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 1px; opacity: 0.6;
            border-bottom: 1px solid rgba(233,209,140,0.15);
        }
        .comp-table td {
            padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .comp-table tr:hover td { background: rgba(255,255,255,0.03); }
        .pct-bar { display: inline-block; height: 6px; border-radius: 3px; margin-right: 8px; vertical-align: middle; }
        .win { color: var(--green); font-weight: 600; }
        .lose { color: var(--red); }
        .tie { color: var(--accent); }

        .distance-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        .distance-card {
            background: rgba(255,255,255,0.04); border-radius: 10px;
            padding: 1rem; border: 1px solid rgba(233,209,140,0.12);
        }
        .distance-card h3 { font-size: 0.9rem; margin-bottom: 0.6rem; color: var(--accent); }
        .distance-card .row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.82rem; }
        .distance-card .row .lbl { opacity: 0.7; }

        .loading-overlay { text-align: center; padding: 3rem; font-size: 1.1rem; }
        .loading-overlay .spinner {
            display: inline-block; width: 40px; height: 40px;
            border: 3px solid rgba(233,209,140,0.2); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-text { font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem; }

        .hippo-table th { cursor: pointer; user-select: none; }
        .hippo-table th:hover { opacity: 1; color: var(--gold); }

        /* Course detail rows */
        .course-row { font-size: 0.82rem; }
        .course-row td { padding: 6px 10px; }
        .course-row.winner td { background: rgba(64,224,90,0.05); }

        /* Leviers */
        .levier-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .levier-table th { text-align: left; padding: 6px 10px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; border-bottom: 1px solid rgba(233,209,140,0.15); }
        .levier-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .levier-table tr:hover td { background: rgba(255,255,255,0.03); }
        .levier-bar { display: inline-block; height: 8px; border-radius: 4px; vertical-align: middle; margin-right: 6px; min-width: 2px; }
        .btn-leviers {
            background: rgba(64,224,208,0.15); color: var(--accent); border: 1px solid var(--accent);
            padding: 8px 20px; border-radius: 6px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: 0.9rem; transition: all 0.2s;
        }
        .btn-leviers:hover { background: rgba(64,224,208,0.25); }
        .btn-leviers:disabled { opacity: 0.5; cursor: wait; }
        .tab-bar { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid rgba(233,209,140,0.15); }
        .tab-item { padding: 8px 16px; cursor: pointer; font-size: 0.85rem; opacity: 0.6; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-item:hover { opacity: 0.8; }
        .tab-item.active { opacity: 1; color: var(--gold); border-bottom-color: var(--gold); }

        @media (max-width: 768px) {
            main { padding: 1rem; }
            .filters { flex-direction: column; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1><i class="fas fa-horse-head"></i> Hippique</h1></div>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="index.html"><i class="fas fa-home"></i> Accueil</a></li>
            <li><a href="courses.html"><i class="fas fa-flag-checkered"></i> Courses</a></li>
            <li><a href="classement.html"><i class="fas fa-list-ol"></i> Classement</a></li>
            <li><a href="simulation.html"><i class="fas fa-calculator"></i> Simulation</a></li>
            <li class="active"><a href="stats.html"><i class="fas fa-chart-bar"></i> Stats</a></li>
        </ul>
    </nav>

    <main>
        <h1 style="margin-bottom:1rem;font-size:1.4rem"><i class="fas fa-chart-bar"></i> Statistiques Globales</h1>

        <div class="filters">
            <div class="filter-group">
                <label>Date début</label>
                <input type="date" id="date-from">
            </div>
            <div class="filter-group">
                <label>Date fin</label>
                <input type="date" id="date-to">
            </div>
            <div class="filter-group">
                <label>Hippodromes</label>
                <div class="hippo-multi">
                    <button class="hippo-btn" id="hippo-btn" onclick="toggleHippoDropdown()">
                        <span id="hippo-label">Tous</span>
                        <i class="fas fa-chevron-down" style="font-size:0.7rem;opacity:0.5"></i>
                    </button>
                    <div class="hippo-dropdown" id="hippo-dropdown">
                        <input type="text" class="hippo-search" placeholder="Rechercher..." oninput="filterHippoList(this.value)">
                        <div class="hippo-actions">
                            <button onclick="selectAllHippo()">Tout cocher</button>
                            <button onclick="deselectAllHippo()">Tout décocher</button>
                        </div>
                        <div id="hippo-list"></div>
                    </div>
                </div>
            </div>
            <div class="filter-group">
                <label>Type</label>
                <select id="type-filter">
                    <option value="">Tous</option>
                    <option value="sprint">Sprint (&lt;1400m)</option>
                    <option value="mile">Mile (1400-1700m)</option>
                    <option value="middle">Middle (1700-2200m)</option>
                    <option value="staying">Staying (&gt;2200m)</option>
                </select>
            </div>
            <button class="btn-filter" id="btn-analyze" onclick="runAnalysis()">
                <i class="fas fa-play"></i> Analyser
            </button>
            <button class="btn-leviers" id="btn-leviers" onclick="runLeviers()">
                <i class="fas fa-sliders-h"></i> Analyse Leviers
            </button>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
                <button class="btn-preset" onclick="setPreset('7d')">7 jours</button>
                <button class="btn-preset" onclick="setPreset('30d')">30 jours</button>
                <button class="btn-preset" onclick="setPreset('90d')">90 jours</button>
                <button class="btn-preset" onclick="setPreset('all')">Tout</button>
            </div>
        </div>

        <div id="results">
            <div class="loading-overlay">
                <p style="opacity:0.5">Sélectionnez une période et cliquez sur Analyser</p>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // SCORING — mêmes formules par distance que ranking-loader.js
    // (Sprint/Mile/Middle/Staying + ajustement peloton)
    // ============================================================
    function scoreCourse(course) {
        const parts = course.participants || [];
        if (!parts.length) return null;

        const dist = parseInt(String(course.distance || '').replace(/[^0-9]/g, '')) || 0;
        const avecCotes = parts.filter(p => p.cote > 1);
        const parCote = [...avecCotes].sort((a, b) => a.cote - b.cote);

        const scored = parts.map(p => {
            const val = parseFloat(p.valeur) || 50;
            const coteS = p.cote > 1 ? (1 / p.cote) * 100 : 50;
            let mus = 50;
            if (p.musique) {
                const pos = p.musique.replace(/\(\d+\)/g, '').match(/(\d+|[DRT])[a-z]/gi);
                if (pos && pos.length >= 2) {
                    const l = pos.slice(0, 5).map(x => {
                        const v = x.slice(0, -1);
                        if ('DRT'.includes(v)) return 12;
                        const n = parseInt(v);
                        return n === 0 ? 12 : n;
                    });
                    let sc = 0, w = 0;
                    l.forEach((ps, i) => {
                        const wt = (l.length - i) / l.length;
                        const s = ps === 1 ? 100 : ps === 2 ? 80 : ps === 3 ? 65 : ps <= 5 ? 45 : ps <= 8 ? 25 : 10;
                        sc += s * wt; w += wt;
                    });
                    mus = w > 0 ? sc / w : 50;
                }
            }
            let s;
            if (dist < 1400) s = mus * 0.4 + coteS * 0.4 + val * 0.2;
            else if (dist < 1700) s = val * 0.5 + coteS * 0.3 + mus * 0.2;
            else if (dist < 2200) {
                const nbC = parseInt(p.nb_courses) || 0;
                const iv = nbC >= 2 ? (parseInt(p.nb_victoires) || 0) / nbC * 100 : 8;
                s = coteS * 0.5 + val * 0.3 + iv * 0.2;
            } else s = coteS * 0.4 + val * 0.3 + mus * 0.3;
            if (parts.length < 9) s += val * 0.15;
            else if (parts.length >= 14) s += 8 * 0.3;
            return { ...p, _s: s };
        }).sort((a, b) => b._s - a._s);

        return { scored, parCote, dist };
    }

    function distLabel(d) { return d < 1400 ? 'sprint' : d < 1700 ? 'mile' : d < 2200 ? 'middle' : 'staying'; }
    function distLabelFr(d) { return d < 1400 ? 'Sprint' : d < 1700 ? 'Mile' : d < 2200 ? 'Middle' : 'Staying'; }

    // ============================================================
    // HIPPODROMES MULTI-SELECT
    // ============================================================
    let allHippodromes = new Set();
    let selectedHippos = new Set(); // vide = tous

    function toggleHippoDropdown() {
        document.getElementById('hippo-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', e => {
        if (!e.target.closest('.hippo-multi')) {
            document.getElementById('hippo-dropdown').classList.remove('open');
        }
    });

    function populateHippoFilter() {
        const list = document.getElementById('hippo-list');
        const sorted = [...allHippodromes].sort();
        list.innerHTML = sorted.map(h =>
            `<label><input type="checkbox" value="${h}" onchange="updateHippoSelection()"> ${h}</label>`
        ).join('');
    }

    function filterHippoList(q) {
        const labels = document.querySelectorAll('#hippo-list label');
        const query = q.toUpperCase();
        labels.forEach(l => {
            l.style.display = l.textContent.toUpperCase().includes(query) ? '' : 'none';
        });
    }

    function selectAllHippo() {
        document.querySelectorAll('#hippo-list input[type="checkbox"]').forEach(cb => {
            if (cb.closest('label').style.display !== 'none') cb.checked = true;
        });
        updateHippoSelection();
    }

    function deselectAllHippo() {
        document.querySelectorAll('#hippo-list input[type="checkbox"]').forEach(cb => cb.checked = false);
        updateHippoSelection();
    }

    function updateHippoSelection() {
        selectedHippos.clear();
        document.querySelectorAll('#hippo-list input[type="checkbox"]:checked').forEach(cb => {
            selectedHippos.add(cb.value);
        });
        const label = document.getElementById('hippo-label');
        if (selectedHippos.size === 0 || selectedHippos.size === allHippodromes.size) {
            label.innerHTML = 'Tous';
        } else if (selectedHippos.size <= 2) {
            label.innerHTML = [...selectedHippos].join(', ');
        } else {
            label.innerHTML = `${selectedHippos.size} hippodromes <span class="count">${selectedHippos.size}</span>`;
        }
    }

    // ============================================================
    // DATA LOADING
    // ============================================================
    let allFiles = null;

    async function loadFileList() {
        if (allFiles) return allFiles;
        const resp = await fetch('https://api.github.com/repos/bencode92/Hippique/contents/data/courses');
        if (!resp.ok) throw new Error('Impossible de charger la liste des fichiers');
        allFiles = await resp.json();
        allFiles.forEach(f => {
            const m = f.name.match(/\d{4}-\d{2}-\d{2}_(.+)\.json$/);
            if (m) allHippodromes.add(m[1].replace(/_/g, ' ').toUpperCase());
        });
        populateHippoFilter();
        return allFiles;
    }

    async function loadCourseFile(file) {
        const resp = await fetch(file.download_url);
        if (!resp.ok) return null;
        return resp.json();
    }

    // ============================================================
    // ANALYSIS
    // ============================================================
    async function runAnalysis() {
        const dateFrom = document.getElementById('date-from').value;
        const dateTo = document.getElementById('date-to').value;
        const typeFilter = document.getElementById('type-filter').value;
        const btn = document.getElementById('btn-analyze');
        const container = document.getElementById('results');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Chargement...';
        container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><p>Chargement des fichiers...</p><p class="progress-text" id="progress"></p></div>';

        try {
            const files = await loadFileList();

            const filtered = files.filter(f => {
                const dateMatch = f.name.match(/^(\d{4}-\d{2}-\d{2})/);
                if (!dateMatch) return false;
                const d = dateMatch[1];
                if (dateFrom && d < dateFrom) return false;
                if (dateTo && d > dateTo) return false;
                if (selectedHippos.size > 0) {
                    const hm = f.name.match(/\d{4}-\d{2}-\d{2}_(.+)\.json$/);
                    if (!hm) return false;
                    const h = hm[1].replace(/_/g, ' ').toUpperCase();
                    if (!selectedHippos.has(h)) return false;
                }
                return true;
            });

            if (!filtered.length) {
                container.innerHTML = '<div class="loading-overlay"><p>Aucun fichier trouvé pour cette période</p></div>';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play"></i> Analyser';
                return;
            }

            const progress = document.getElementById('progress');
            const R = { total: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 };
            const byDist = {
                sprint: { t: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 },
                mile:   { t: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 },
                middle: { t: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 },
                staying:{ t: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 }
            };
            const byHippo = {};
            const byDate = {};
            const courseDetails = []; // pour le tableau détaillé
            let filesLoaded = 0;
            let coteSumOur = 0, coteSumFav = 0, winsOur = 0, winsFav = 0;

            // Stocker les courses pour l'analyse leviers
            loadedCourses = [];

            const BATCH = 15;
            for (let i = 0; i < filtered.length; i += BATCH) {
                const batch = filtered.slice(i, i + BATCH);
                const datas = await Promise.all(batch.map(f => loadCourseFile(f)));

                datas.forEach((data, idx) => {
                    filesLoaded++;
                    if (!data) return;
                    if (data.type_reunion && data.type_reunion.toLowerCase() !== 'plat') return;

                    const hippo = (data.hippodrome || '').toUpperCase();
                    const fileDate = (batch[idx].name.match(/^(\d{4}-\d{2}-\d{2})/) || [])[1] || '';

                    (data.courses || []).forEach(course => {
                        if (course.type && course.type.toLowerCase() !== 'plat') return;
                        if (!course.participants || !course.participants.length) return;
                        if (!course.arrivee_definitive) return;
                        if (!course.participants.some(p => p.arrivee === 1)) return;

                        const dist = parseInt(String(course.distance || '').replace(/[^0-9]/g, '')) || 0;
                        const dl = distLabel(dist);
                        if (typeFilter && dl !== typeFilter) return;

                        const r = scoreCourse(course);
                        if (!r || !r.scored.length || !r.parCote.length) return;

                        // Stocker pour leviers
                        loadedCourses.push({ course, hippo, fileDate, dist, dl, parCote: r.parCote });

                        R.total++;
                        const isN1 = r.scored[0]?.arrivee === 1;
                        const isF1 = r.parCote[0]?.arrivee === 1;
                        const isN2 = r.scored.slice(0, 2).some(p => p.arrivee === 1);
                        const isF2 = r.parCote.slice(0, 2).some(p => p.arrivee === 1);
                        const isN3 = r.scored.slice(0, 3).some(p => p.arrivee === 1);
                        const isF3 = r.parCote.slice(0, 3).some(p => p.arrivee === 1);

                        if (isN1) { R.n1++; if (r.scored[0].cote > 1) { coteSumOur += r.scored[0].cote; winsOur++; } }
                        if (isF1) { R.f1++; if (r.parCote[0].cote > 1) { coteSumFav += r.parCote[0].cote; winsFav++; } }
                        if (isN2) R.n2++;
                        if (isF2) R.f2++;
                        if (isN3) R.n3++;
                        if (isF3) R.f3++;

                        byDist[dl].t++;
                        if (isN1) byDist[dl].n1++;
                        if (isF1) byDist[dl].f1++;
                        if (isN2) byDist[dl].n2++;
                        if (isF2) byDist[dl].f2++;
                        if (isN3) byDist[dl].n3++;
                        if (isF3) byDist[dl].f3++;

                        if (!byHippo[hippo]) byHippo[hippo] = { t: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 };
                        byHippo[hippo].t++;
                        if (isN1) byHippo[hippo].n1++;
                        if (isF1) byHippo[hippo].f1++;
                        if (isN2) byHippo[hippo].n2++;
                        if (isF2) byHippo[hippo].f2++;
                        if (isN3) byHippo[hippo].n3++;
                        if (isF3) byHippo[hippo].f3++;

                        if (!byDate[fileDate]) byDate[fileDate] = { t: 0, n1: 0, f1: 0, n2: 0, f2: 0, n3: 0, f3: 0 };
                        byDate[fileDate].t++;
                        if (isN1) byDate[fileDate].n1++;
                        if (isF1) byDate[fileDate].f1++;
                        if (isN2) byDate[fileDate].n2++;
                        if (isF2) byDate[fileDate].f2++;
                        if (isN3) byDate[fileDate].n3++;
                        if (isF3) byDate[fileDate].f3++;

                        // Détail course
                        const gagnant = course.participants.find(p => p.arrivee === 1);
                        courseDetails.push({
                            date: fileDate, hippo, nom: course.nom || '',
                            dist, dl,
                            gagnant: gagnant ? (gagnant.cheval || '').slice(0, 18) : '?',
                            gagnantNum: gagnant ? gagnant['n°'] : '?',
                            gagnantCote: gagnant ? gagnant.cote : 0,
                            notreTop1: (r.scored[0]?.cheval || '').slice(0, 18),
                            notreTop1Num: r.scored[0]?.['n°'] || '?',
                            notreTop1Cote: r.scored[0]?.cote || 0,
                            favNum: r.parCote[0]?.['n°'] || '?',
                            favCote: r.parCote[0]?.cote || 0,
                            isN1, isF1, isN2, isF2, isN3, isF3,
                            partants: course.participants.length
                        });
                    });
                });

                if (progress) progress.textContent = `${filesLoaded} / ${filtered.length} fichiers (${R.total} courses)`;
            }

            renderResults(R, byDist, byHippo, byDate, courseDetails, coteSumOur, coteSumFav, winsOur, winsFav);

        } catch (err) {
            container.innerHTML = `<div class="loading-overlay"><p style="color:var(--red)">Erreur : ${err.message}</p></div>`;
            console.error(err);
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-play"></i> Analyser';
    }

    // ============================================================
    // RENDER
    // ============================================================
    function pct(n, t) { return t > 0 ? Math.round(n / t * 100) : 0; }
    function pctStr(n, t) { return t > 0 ? `${Math.round(n / t * 100)}%` : '-'; }
    function cmpClass(a, b) { return a > b ? 'win' : a < b ? 'lose' : 'tie'; }

    function renderResults(R, byDist, byHippo, byDate, courseDetails, coteSumOur, coteSumFav, winsOur, winsFav) {
        const container = document.getElementById('results');
        if (R.total === 0) {
            container.innerHTML = '<div class="loading-overlay"><p>Aucune course terminée trouvée</p></div>';
            return;
        }

        const avgCoteOur = winsOur > 0 ? (coteSumOur / winsOur).toFixed(1) : '-';
        const avgCoteFav = winsFav > 0 ? (coteSumFav / winsFav).toFixed(1) : '-';

        let html = '';

        // Summary cards
        html += `<div class="stats-grid">
            <div class="stat-card">
                <div class="label">Courses</div>
                <div class="value">${R.total}</div>
                <div class="sub">terminées</div>
            </div>
            <div class="stat-card">
                <div class="label">Notre Top 1</div>
                <div class="value" style="color:${pct(R.n1,R.total)>=pct(R.f1,R.total)?'var(--green)':'var(--red)'}">${pctStr(R.n1,R.total)}</div>
                <div class="sub">${R.n1}/${R.total}</div>
            </div>
            <div class="stat-card">
                <div class="label">Favori cote</div>
                <div class="value" style="color:${pct(R.f1,R.total)>=pct(R.n1,R.total)?'var(--green)':'var(--red)'}">${pctStr(R.f1,R.total)}</div>
                <div class="sub">${R.f1}/${R.total}</div>
            </div>
            <div class="stat-card">
                <div class="label">Notre Top 2</div>
                <div class="value" style="color:var(--accent)">${pctStr(R.n2,R.total)}</div>
                <div class="sub">${R.n2}/${R.total}</div>
            </div>
            <div class="stat-card">
                <div class="label">Notre Top 3</div>
                <div class="value" style="color:var(--accent)">${pctStr(R.n3,R.total)}</div>
                <div class="sub">${R.n3}/${R.total}</div>
            </div>
            <div class="stat-card">
                <div class="label">Cote moy. wins</div>
                <div class="value" style="font-size:1.3rem">${avgCoteOur}</div>
                <div class="sub">vs ${avgCoteFav} fav</div>
            </div>
        </div>`;

        // Comparison table
        html += `<div class="section">
            <h2><i class="fas fa-balance-scale"></i> Notre Modèle vs Favori Cote</h2>
            <table class="comp-table">
                <thead><tr><th>Métrique</th><th>Notre Modèle</th><th>Favori Cote</th><th>Écart</th></tr></thead>
                <tbody>
                ${compRow('Top 1 (gagnant)', R.n1, R.f1, R.total)}
                ${compRow('Top 2', R.n2, R.f2, R.total)}
                ${compRow('Top 3', R.n3, R.f3, R.total)}
                </tbody>
            </table>
        </div>`;

        // Distance breakdown
        html += `<div class="section">
            <h2><i class="fas fa-ruler-horizontal"></i> Par type de distance</h2>
            <div class="distance-grid">`;
        for (const [key, label] of [['sprint','Sprint (<1400m)'],['mile','Mile (1400-1700m)'],['middle','Middle (1700-2200m)'],['staying','Staying (>2200m)']]) {
            const d = byDist[key];
            if (d.t === 0) continue;
            html += `<div class="distance-card">
                <h3>${label} — ${d.t} courses</h3>
                <div class="row"><span class="lbl">Top1 Modèle</span><span class="${cmpClass(pct(d.n1,d.t),pct(d.f1,d.t))}">${pctStr(d.n1,d.t)} (${d.n1})</span></div>
                <div class="row"><span class="lbl">Top1 Favori</span><span class="${cmpClass(pct(d.f1,d.t),pct(d.n1,d.t))}">${pctStr(d.f1,d.t)} (${d.f1})</span></div>
                <hr style="border-color:rgba(255,255,255,0.05);margin:3px 0">
                <div class="row"><span class="lbl">Top2 Modèle</span><span class="${cmpClass(pct(d.n2,d.t),pct(d.f2,d.t))}">${pctStr(d.n2,d.t)}</span></div>
                <div class="row"><span class="lbl">Top2 Favori</span><span class="${cmpClass(pct(d.f2,d.t),pct(d.n2,d.t))}">${pctStr(d.f2,d.t)}</span></div>
                <hr style="border-color:rgba(255,255,255,0.05);margin:3px 0">
                <div class="row"><span class="lbl">Top3 Modèle</span><span class="${cmpClass(pct(d.n3,d.t),pct(d.f3,d.t))}">${pctStr(d.n3,d.t)}</span></div>
                <div class="row"><span class="lbl">Top3 Favori</span><span class="${cmpClass(pct(d.f3,d.t),pct(d.n3,d.t))}">${pctStr(d.f3,d.t)}</span></div>
            </div>`;
        }
        html += `</div></div>`;

        // Hippodrome breakdown
        const hippoEntries = Object.entries(byHippo).filter(([,v]) => v.t >= 2).sort((a,b) => b[1].t - a[1].t);
        if (hippoEntries.length) {
            html += `<div class="section">
                <h2><i class="fas fa-map-marker-alt"></i> Par hippodrome (min. 2 courses)</h2>
                <div style="overflow-x:auto">
                <table class="comp-table hippo-table" id="hippo-table">
                    <thead><tr>
                        <th data-sort="name">Hippodrome</th>
                        <th data-sort="t">Courses</th>
                        <th data-sort="n1">Top1 Modèle</th>
                        <th data-sort="f1">Top1 Favori</th>
                        <th data-sort="n2">Top2 Mod.</th>
                        <th data-sort="f2">Top2 Fav.</th>
                        <th data-sort="n3">Top3 Mod.</th>
                        <th data-sort="f3">Top3 Fav.</th>
                    </tr></thead>
                    <tbody>`;
            hippoEntries.forEach(([h, d]) => {
                html += `<tr>
                    <td>${h}</td><td>${d.t}</td>
                    <td class="${cmpClass(pct(d.n1,d.t),pct(d.f1,d.t))}">${pctStr(d.n1,d.t)} (${d.n1})</td>
                    <td class="${cmpClass(pct(d.f1,d.t),pct(d.n1,d.t))}">${pctStr(d.f1,d.t)} (${d.f1})</td>
                    <td class="${cmpClass(pct(d.n2,d.t),pct(d.f2,d.t))}">${pctStr(d.n2,d.t)}</td>
                    <td class="${cmpClass(pct(d.f2,d.t),pct(d.n2,d.t))}">${pctStr(d.f2,d.t)}</td>
                    <td class="${cmpClass(pct(d.n3,d.t),pct(d.f3,d.t))}">${pctStr(d.n3,d.t)}</td>
                    <td class="${cmpClass(pct(d.f3,d.t),pct(d.n3,d.t))}">${pctStr(d.f3,d.t)}</td>
                </tr>`;
            });
            html += `</tbody></table></div></div>`;
        }

        // Daily evolution
        const dates = Object.keys(byDate).sort();
        if (dates.length > 1) {
            html += `<div class="section">
                <h2><i class="fas fa-calendar-alt"></i> Évolution journalière</h2>
                <div style="overflow-x:auto">
                <table class="comp-table">
                    <thead><tr><th>Date</th><th>Courses</th><th>Top1 Mod.</th><th>Top1 Fav.</th><th>Top2 Mod.</th><th>Top3 Mod.</th></tr></thead>
                    <tbody>`;
            dates.slice(-30).forEach(d => {
                const dd = byDate[d];
                html += `<tr>
                    <td>${d}</td><td>${dd.t}</td>
                    <td class="${cmpClass(pct(dd.n1,dd.t),pct(dd.f1,dd.t))}">${pctStr(dd.n1,dd.t)} (${dd.n1}/${dd.t})</td>
                    <td class="${cmpClass(pct(dd.f1,dd.t),pct(dd.n1,dd.t))}">${pctStr(dd.f1,dd.t)} (${dd.f1}/${dd.t})</td>
                    <td>${pctStr(dd.n2,dd.t)}</td>
                    <td>${pctStr(dd.n3,dd.t)}</td>
                </tr>`;
            });
            html += `</tbody></table></div></div>`;
        }

        // Course-by-course detail (collapsible)
        if (courseDetails.length) {
            const sortedDetails = [...courseDetails].sort((a, b) => b.date.localeCompare(a.date) || a.hippo.localeCompare(b.hippo));
            html += `<div class="section">
                <h2 style="cursor:pointer" onclick="document.getElementById('detail-table').style.display=document.getElementById('detail-table').style.display==='none'?'':'none'">
                    <i class="fas fa-list"></i> Détail course par course (${courseDetails.length}) <span style="font-size:0.7em;opacity:0.5">▼ cliquer pour ouvrir</span>
                </h2>
                <div id="detail-table" style="display:none;overflow-x:auto;margin-top:0.5rem">
                <table class="comp-table" style="font-size:0.8rem">
                    <thead><tr>
                        <th>Date</th><th>Hippodrome</th><th>Course</th><th>Dist</th><th>Part.</th>
                        <th>Notre #1</th><th>Cote</th><th>Favori</th><th>Cote</th>
                        <th>Gagnant</th><th>Cote</th>
                        <th>N1</th><th>F1</th><th>N2</th><th>N3</th>
                    </tr></thead>
                    <tbody>`;
            sortedDetails.forEach(c => {
                const n1c = c.isN1 ? 'win' : '';
                const f1c = c.isF1 ? 'win' : '';
                html += `<tr class="course-row">
                    <td>${c.date}</td><td>${c.hippo}</td><td>${c.nom.slice(0, 25)}</td>
                    <td>${c.dist}m</td><td>${c.partants}</td>
                    <td>#${c.notreTop1Num} ${c.notreTop1}</td>
                    <td>${c.notreTop1Cote > 0 ? c.notreTop1Cote.toFixed(1) : '-'}</td>
                    <td>#${c.favNum}</td>
                    <td>${c.favCote > 0 ? c.favCote.toFixed(1) : '-'}</td>
                    <td>#${c.gagnantNum} ${c.gagnant}</td>
                    <td>${c.gagnantCote > 0 ? c.gagnantCote.toFixed(1) : '-'}</td>
                    <td class="${n1c}">${c.isN1 ? '✓' : ''}</td>
                    <td class="${f1c}">${c.isF1 ? '✓' : ''}</td>
                    <td>${c.isN2 ? '✓' : ''}</td>
                    <td>${c.isN3 ? '✓' : ''}</td>
                </tr>`;
            });
            html += `</tbody></table></div></div>`;
        }

        container.innerHTML = html;
        setupHippoSort();
    }

    function compRow(label, nVal, fVal, total) {
        const pn = pct(nVal, total), pf = pct(fVal, total);
        const diff = pn - pf;
        const diffStr = diff > 0 ? `+${diff}pp` : diff < 0 ? `${diff}pp` : '=';
        const diffClass = diff > 0 ? 'win' : diff < 0 ? 'lose' : 'tie';
        return `<tr>
            <td>${label}</td>
            <td><span class="pct-bar" style="width:${pn}px;background:var(--accent)"></span><span class="${cmpClass(pn,pf)}">${pn}%</span> <span style="opacity:0.5">(${nVal}/${total})</span></td>
            <td><span class="pct-bar" style="width:${pf}px;background:var(--gold)"></span><span class="${cmpClass(pf,pn)}">${pf}%</span> <span style="opacity:0.5">(${fVal}/${total})</span></td>
            <td class="${diffClass}">${diffStr}</td>
        </tr>`;
    }

    function setupHippoSort() {
        const table = document.getElementById('hippo-table');
        if (!table) return;
        table.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.sort;
                const tbody = table.querySelector('tbody');
                const rows = [...tbody.querySelectorAll('tr')];
                const asc = th.classList.contains('sort-asc');
                table.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                th.classList.add(asc ? 'sort-desc' : 'sort-asc');
                rows.sort((a, b) => {
                    const idx = [...th.parentNode.children].indexOf(th);
                    const va = a.children[idx].textContent.trim();
                    const vb = b.children[idx].textContent.trim();
                    if (key === 'name') return asc ? vb.localeCompare(va) : va.localeCompare(vb);
                    return asc ? (parseFloat(va)||0) - (parseFloat(vb)||0) : (parseFloat(vb)||0) - (parseFloat(va)||0);
                });
                rows.forEach(r => tbody.appendChild(r));
            });
        });
    }

    // ============================================================
    // PRESETS
    // ============================================================
    function setPreset(p) {
        const to = new Date();
        const from = new Date();
        document.querySelectorAll('.btn-preset').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        if (p === '7d') from.setDate(to.getDate() - 7);
        else if (p === '30d') from.setDate(to.getDate() - 30);
        else if (p === '90d') from.setDate(to.getDate() - 90);
        else { from.setFullYear(2025); from.setMonth(10); from.setDate(1); }
        document.getElementById('date-from').value = fmt(from);
        document.getElementById('date-to').value = fmt(to);
        runAnalysis();
    }

    function fmt(d) { return d.toISOString().split('T')[0]; }

    // ============================================================
    // ANALYSE LEVIERS
    // ============================================================
    let loadedCourses = [];
    let rankingData = null;

    const RAW = 'https://raw.githubusercontent.com/Bencode92/Hippique/main/data/';

    async function loadRankings() {
        if (rankingData) return rankingData;
        const files = {
            chx25: 'chevaux_2025_ponderated_latest.json',
            chx26: 'chevaux_ponderated_latest.json',
            jk25: 'jockeys_2025_ponderated_latest.json',
            jk26: 'jockeys_ponderated_latest.json',
            cr25: 'cravache_or_2025_ponderated_latest.json',
            cr26: 'cravache_or_ponderated_latest.json',
            forme: 'chevaux_forme_recente.json',
            combo: 'combo_jockey_entraineur.json',
        };
        const results = {};
        const entries = Object.entries(files);
        const fetches = await Promise.all(entries.map(([, f]) => fetch(RAW + f).then(r => r.ok ? r.json() : null).catch(() => null)));
        entries.forEach(([k], i) => { results[k] = fetches[i]; });

        function buildMap(data, keyField) {
            const m = {};
            if (!data?.resultats) return m;
            const list = Array.isArray(data.resultats) ? data.resultats : Object.entries(data.resultats).map(([k, v]) => ({ _key: k, ...v }));
            list.forEach(item => { const k = (item[keyField] || item._key || '').toUpperCase().trim(); if (k) m[k] = item; });
            return m;
        }

        rankingData = {
            chx25: buildMap(results.chx25, 'Nom'), chx26: buildMap(results.chx26, 'Nom'),
            jk25: buildMap(results.jk25, 'NomPostal'), jk26: buildMap(results.jk26, 'NomPostal'),
            cr25: buildMap(results.cr25, 'NomPostal'), cr26: buildMap(results.cr26, 'NomPostal'),
            forme: results.forme?.resultats || {}, combo: results.combo?.resultats || {},
        };
        return rankingData;
    }

    function extractNom(cheval) { return (cheval || '').replace(/\s+[MFH]\.\w*\.?\s*\d+\s*a\.?\s*$/i, '').trim().toUpperCase(); }

    function parseMusique(m) {
        if (!m) return 50;
        const pos = m.replace(/\(\d+\)/g, '').match(/(\d+|[DRT])[a-z]/gi);
        if (!pos || pos.length < 2) return 50;
        const l = pos.slice(0, 5).map(x => { const v = x.slice(0, -1); if ('DRT'.includes(v)) return 12; const n = parseInt(v); return n === 0 ? 12 : n; });
        let sc = 0, w = 0;
        l.forEach((ps, i) => { const wt = (l.length - i) / l.length; const s = ps === 1 ? 100 : ps === 2 ? 80 : ps === 3 ? 65 : ps <= 5 ? 45 : ps <= 8 ? 25 : 10; sc += s * wt; w += wt; });
        return w > 0 ? sc / w : 50;
    }

    // Pré-calculer les populations une seule fois
    let _pop = null;
    function getPop(rd) {
        if (!_pop) _pop = { chx25: Object.keys(rd.chx25).length||1, chx26: Object.keys(rd.chx26).length||1, jk25: Object.keys(rd.jk25).length||1, jk26: Object.keys(rd.jk26).length||1, cr25: Object.keys(rd.cr25).length||1, cr26: Object.keys(rd.cr26).length||1 };
        return _pop;
    }

    function computeLeviers(p, rd) {
        const nom = extractNom(p.cheval);
        const jk = (p.jockey || '').toUpperCase().trim();
        const coteVal = parseFloat(p.cote) || 0;
        const coteRef = parseFloat(p.cote_reference) || 0;
        const valeur = parseFloat(p.valeur) || 0;
        const gains = parseInt(String(p.gains || '').replace(/\D/g, '')) || 0;
        const nbC = parseInt(p.nb_courses) || 0;
        const nbV = parseInt(p.nb_victoires) || 0;
        const nbP = parseInt(p.nb_places) || 0;
        const ch25 = rd.chx25[nom], ch26 = rd.chx26[nom];
        const j25 = rd.jk25[jk], j26 = rd.jk26[jk];
        const cr25 = rd.cr25[jk], cr26 = rd.cr26[jk];
        const pop = getPop(rd);
        const mxF = (a, b, f) => Math.max(a ? parseFloat(a[f]||0) : 0, b ? parseFloat(b[f]||0) : 0);
        const rS = (it, pp) => it ? 100*(1-(parseInt(it.Rang)-1)/pp) : 50;
        const bR = (a, pA, b, pB) => { const sa=a?rS(a,pA):null, sb=b?rS(b,pB):null; return sa!==null&&sb!==null?Math.max(sa,sb):sa??sb??50; };
        const forme = rd.forme[nom];
        const comboKey = jk + '|||' + (p.entraineur || p['entraîneur'] || '').toUpperCase().trim();
        const combo = rd.combo[comboKey];
        return {
            'Cote (1/cote)': coteVal>1?(1/coteVal)*100:50, 'Cote ref': coteRef>1?(1/coteRef)*100:50,
            'Valeur FG': valeur>0?valeur:50, 'Musique': parseMusique(p.musique),
            'Gains (log)': gains>0?Math.log10(gains)*10:0,
            'TauxV indiv': nbC>=2?nbV/nbC*100:8, 'TauxP indiv': nbC>=2?nbP/nbC*100:30,
            'NbVictoires': nbV*5,
            'Ch TauxV': mxF(ch25,ch26,'TauxVictoire')||8, 'Ch TauxP': mxF(ch25,ch26,'TauxPlace')||30,
            'Ch Rang': bR(ch25,pop.chx25,ch26,pop.chx26),
            'Ch GainMoy': Math.max(ch25?.GainMoyen||0,ch26?.GainMoyen||0)>0?Math.log10(Math.max(ch25?.GainMoyen||0,ch26?.GainMoyen||0))*15:0,
            'Ch ScoreMixte': mxF(ch25,ch26,'ScoreMixte'),
            'Jk TauxV': mxF(j25,j26,'TauxVictoire')||8, 'Jk TauxP': mxF(j25,j26,'TauxPlace')||30,
            'Jk Rang': bR(j25,pop.jk25,j26,pop.jk26), 'Jk ScoreMixte': mxF(j25,j26,'ScoreMixte'),
            'Jk GainMoy': Math.max(j25?.GainMoyen||0,j26?.GainMoyen||0)>0?Math.log10(Math.max(j25?.GainMoyen||0,j26?.GainMoyen||0))*15:0,
            'Cravache Rang': bR(cr25,pop.cr25,cr26,pop.cr26),
            'Forme récente': forme?forme.formeScore:50,
            'Combo Jk*Ent': combo&&combo.courses>=3?combo.tauxVictoire:10,
        };
    }

    async function runLeviers() {
        const container = document.getElementById('results');
        const btn = document.getElementById('btn-leviers');

        if (!loadedCourses.length) {
            alert('Lance d\'abord "Analyser" pour charger les courses.');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Classements...';
        container.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><p>Chargement des classements...</p><p class="progress-text" id="lev-progress"></p></div>';

        try {
            const rd = await loadRankings();
            _pop = null; // reset pop cache

            // Phase 1 : pré-calculer tous les leviers par participant (une seule fois)
            const progress = document.getElementById('lev-progress');
            if (progress) progress.textContent = 'Pré-calcul des leviers...';
            await new Promise(r => setTimeout(r, 30));

            // Enrichir chaque course avec les leviers pré-calculés
            const enriched = [];
            for (let i = 0; i < loadedCourses.length; i++) {
                const c = loadedCourses[i];
                const parts = c.course.participants.map(p => ({ ...p, _lev: computeLeviers(p, rd) }));
                enriched.push({ ...c, parts });
                if (i % 50 === 0) {
                    if (progress) progress.textContent = `Pré-calcul ${i+1}/${loadedCourses.length} courses...`;
                    await new Promise(r => setTimeout(r, 0));
                }
            }

            // Phase 2 : évaluer chaque levier (juste des lookups, très rapide)
            const levierNames = Object.keys(enriched[0].parts[0]._lev);
            const categories = { tous: enriched, sprint: [], mile: [], middle: [], staying: [] };
            enriched.forEach(c => { categories[c.dl].push(c); });

            if (progress) progress.textContent = 'Évaluation des leviers...';
            await new Promise(r => setTimeout(r, 0));

            function evalLevier(courses, name) {
                let n1=0, f1=0, n2=0, n3=0;
                let coteSum=0, wins=0;
                courses.forEach(c => {
                    const sorted = [...c.parts].sort((a,b) => (b._lev[name]||0) - (a._lev[name]||0));
                    if (sorted[0]?.arrivee===1) { n1++; if (sorted[0].cote>1) { coteSum+=sorted[0].cote; wins++; } }
                    if (c.parCote[0]?.arrivee===1) f1++;
                    if (sorted.slice(0,2).some(p=>p.arrivee===1)) n2++;
                    if (sorted.slice(0,3).some(p=>p.arrivee===1)) n3++;
                });
                const t = courses.length;
                return { n1, f1, n2, n3, t, pN1:t?n1/t*100:0, pF1:t?f1/t*100:0, pN2:t?n2/t*100:0, pN3:t?n3/t*100:0, avgCote:wins>0?coteSum/wins:0 };
            }

            const catLabels = { tous:'Toutes distances', sprint:'Sprint (<1400m)', mile:'Mile (1400-1700m)', middle:'Middle (1700-2200m)', staying:'Staying (>2200m)' };

            let html = `<div class="section"><h2><i class="fas fa-sliders-h"></i> Analyse Leviers — Quel critère prédit le mieux le gagnant ?</h2>`;
            html += `<p style="opacity:0.6;font-size:0.82rem;margin-bottom:1rem">Chaque levier est testé seul : on classe les partants par ce critère et on regarde si le #1 gagne. Comparé au favori cote.</p>`;

            html += `<div class="tab-bar">`;
            let firstTab = true;
            Object.entries(catLabels).forEach(([k, label]) => {
                if (categories[k].length < 5) return;
                html += `<div class="tab-item ${firstTab ? 'active' : ''}" onclick="showLevierTab('${k}', this)">${label} (${categories[k].length})</div>`;
                firstTab = false;
            });
            html += `</div>`;

            firstTab = true;
            Object.entries(catLabels).forEach(([cat]) => {
                const courses = categories[cat];
                if (courses.length < 5) return;

                const results = levierNames.map(name => ({ name, ...evalLevier(courses, name) })).sort((a,b) => b.pN1 - a.pN1);
                const favP = results[0].pF1;
                const maxP = Math.max(...results.map(r => r.pN1), favP);

                html += `<div class="levier-content" id="levier-${cat}" style="display:${firstTab ? '' : 'none'}">`;
                html += `<table class="levier-table"><thead><tr><th>#</th><th>Levier</th><th>Top1</th><th style="width:120px"></th><th>vs Fav</th><th>Top2</th><th>Top3</th><th>Cote moy</th></tr></thead><tbody>`;

                results.forEach((r, idx) => {
                    const diff = r.pN1 - favP;
                    const diffStr = diff > 0 ? `+${diff.toFixed(0)}pp` : diff === 0 ? '=' : `${diff.toFixed(0)}pp`;
                    const cls = diff > 0 ? 'win' : diff < 0 ? 'lose' : 'tie';
                    const barW = maxP > 0 ? Math.round(r.pN1 / maxP * 100) : 0;
                    const barWF = maxP > 0 ? Math.round(favP / maxP * 100) : 0;
                    const medal = idx === 0 ? '&#129351;' : idx === 1 ? '&#129352;' : idx === 2 ? '&#129353;' : String(idx+1);
                    html += `<tr><td>${medal}</td><td><strong>${r.name}</strong></td>
                        <td class="${cls}" style="font-size:1rem"><strong>${r.pN1.toFixed(0)}%</strong> <span style="opacity:0.5;font-size:0.75rem">(${r.n1}/${r.t})</span></td>
                        <td><div style="position:relative;height:14px"><span class="levier-bar" style="width:${barW}%;background:var(--accent);position:absolute;top:0"></span><span class="levier-bar" style="width:${barWF}%;background:var(--gold);opacity:0.4;position:absolute;top:8px;height:4px"></span></div></td>
                        <td class="${cls}">${diffStr}</td><td>${r.pN2.toFixed(0)}%</td><td>${r.pN3.toFixed(0)}%</td><td>${r.avgCote > 0 ? r.avgCote.toFixed(1) : '-'}</td></tr>`;
                });

                html += `<tr style="border-top:2px solid rgba(233,209,140,0.2)"><td>&#9733;</td><td><strong style="color:var(--gold)">Favori cote (baseline)</strong></td><td style="color:var(--gold);font-size:1rem"><strong>${favP.toFixed(0)}%</strong></td><td></td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
                html += `</tbody></table></div>`;
                firstTab = false;
            });

            html += `</div>`;
            container.innerHTML = html;

        } catch (err) {
            container.innerHTML = `<div class="loading-overlay"><p style="color:var(--red)">Erreur : ${err.message}</p></div>`;
            console.error(err);
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sliders-h"></i> Analyse Leviers';
    }

    function showLevierTab(cat, el) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.levier-content').forEach(c => c.style.display = 'none');
        document.getElementById('levier-' + cat).style.display = '';
    }

    // Init dates
    (function() {
        const to = new Date();
        const from = new Date();
        from.setDate(to.getDate() - 30);
        document.getElementById('date-from').value = fmt(from);
        document.getElementById('date-to').value = fmt(to);
    })();
    </script>
</body>
