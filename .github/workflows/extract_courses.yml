name: Extraction des courses France Galop

on:
  schedule:
    # Matin 10h UTC (12h France) — cotes d'ouverture + programme
    - cron: '0 10 * * *'
    # Soir 20h UTC (22h France) — résultats + cotes finales
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date des courses (YYYY-MM-DD ou today/tomorrow)'
        required: false
        default: 'today'

permissions:
  contents: write

jobs:
  extract_courses:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run extraction script
        run: |
          DATE_ARG="${{ github.event.inputs.date || 'today' }}"
          python scraper_courses_pmu.py ${DATE_ARG}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git stash -u || true
          git pull origin main --rebase
          git stash pop || true

          mkdir -p data/courses
          git add data/courses/*.json

          if git diff --cached --quiet; then
            echo "Aucun changement détecté"
          else
            git commit -m "📊 Courses + cotes PMU - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
