name: Snapshot Rankings

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Créer le snapshot brut horodaté
        run: |
          STAMP=$(date -u +"%Y-%m-%d_%Hh%M")
          echo "📸 Stamp: $STAMP"
          # Snapshot des bruts (Rang officiel France Galop, ratios calculés à la volée)
          # Plus de pondered_ranking qui inventait un ScoreMixte → classement aligné avec le site
          python3 scripts/snapshot_brut.py "$STAMP"
          echo ""
          echo "=== Contenu du snapshot ==="
          ls -la "data/rankings/$STAMP/"

      - name: Commit et push
        run: |
          STAMP=$(date -u +"%Y-%m-%d_%Hh%M")
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Snapshot"
          git add data/rankings/
          if git diff --cached --quiet; then
            echo "Aucun changement"
          else
            git commit -m "📸 Snapshot rankings ${STAMP}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
