name: France Galop Selenium Extraction

on:
  schedule:
    # Exécution quotidienne à 4h du matin
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      categories:
        description: 'Catégories à extraire (séparées par des virgules, laisser vide pour toutes)'
        required: false
        default: ''
      max_clicks:
        description: 'Ignoré (compatibilité) - le nouveau scraper utilise requests'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  extract_data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Run extraction script
        run: |
          CATEGORIES="${{ github.event.inputs.categories }}"
          if [ -z "$CATEGORIES" ]; then
            python scraper_rankings.py
          else
            python scraper_rankings.py "$CATEGORIES"
          fi
      
      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git stash -u || true
          git pull origin main --rebase
          git stash pop || true
          
          git add data/*.json
          
          if git diff --cached --quiet; then
            echo "Aucun changement détecté dans les données"
          else
            git commit -m "📊 Update rankings - $(date +'%Y-%m-%d')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
