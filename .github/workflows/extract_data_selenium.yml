name: France Galop Rankings (backup - requests)

# Désactivé: les rankings sont maintenant gérés via CSV manuels
# → Workflow "Convert Rankings CSV to JSON" 
# Ce workflow reste disponible en backup via lancement manuel
on:
  workflow_dispatch:
    inputs:
      categories:
        description: 'Catégories (séparées par virgules, vide = toutes)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  extract_data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Run extraction script
        run: |
          CATEGORIES="${{ github.event.inputs.categories }}"
          if [ -z "$CATEGORIES" ]; then
            python scraper_rankings.py
          else
            python scraper_rankings.py "$CATEGORIES"
          fi
      
      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git stash -u || true
          git pull origin main --rebase
          git stash pop || true
          
          git add data/*.json
          
          if git diff --cached --quiet; then
            echo "Aucun changement"
          else
            git commit -m "📊 Update rankings (scraper) - $(date +'%Y-%m-%d')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
